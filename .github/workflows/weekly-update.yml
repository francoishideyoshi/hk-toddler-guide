name: Weekly events update

on:
  schedule:
    # Wed 04:00 HKT == Tue 20:00 UTC
    - cron: "0 20 * * 2"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull feeds and update index.html
        run: python3 scripts/update_events.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet index.html; then
            echo "No changes."
          else
            git add index.html
            git commit -m "chore: weekly events update [skip ci]"
            git push
          fi
